<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Zympfhor</title>
        <link rel="icon" href="/favicon.svg">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
        <style>
            *,::after,::before {
                box-sizing: border-box
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: 'Inter',system-ui,sans-serif;
                background: linear-gradient(135deg,#0a0a0c 0%,#0f0f14 50%,#12121a 100%);
                color: rgba(255,255,255,0.92);
                overflow-x: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1.5rem;
                position: relative
            }

            .lp-main {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                max-width: 480px
            }

            .lp {
                max-width: 420px;
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center
            }

            .lp-card {
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 20px;
                padding: 2.5rem 2rem;
                box-shadow: 0 24px 48px rgba(0,0,0,0.35),0 0 0 1px rgba(255,255,255,0.03) inset;
                width: 100%
            }

            .lp-sub {
                font-size: 0.95rem;
                font-weight: 400;
                line-height: 1.65;
                color: rgba(255,255,255,0.72);
                margin: 0;
                text-align: center
            }
        </style>
    </head>
    <body>
        <main class="lp-main">
            <div class="lp">
                <div class="lp-card">
                    <p class="lp-sub">
                        Zympfhor w trakcie prac technicznych.<br>Gdy tylko coś sie zmieni damy znać!
                    </p>
                </div>
            </div>
        </main>
    </body>
</html>
